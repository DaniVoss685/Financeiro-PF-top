<svg xmlns="http://www.w3.org/2000/svg" width="1254" height="1254" viewBox="0 0 1254 1254" role="img" aria-labelledby="title desc">
  <title id="title">Ícone do aplicativo Contaju</title>
  <desc id="desc">Leão dourado em forma de peça de xadrez sobre fundo preto com moldura dourada.</desc>
  <defs>
    <radialGradient id="bg" cx="42%" cy="28%" r="78%">
      <stop offset="0" stop-color="#252525"/>
      <stop offset="0.55" stop-color="#111111"/>
      <stop offset="1" stop-color="#050505"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0.88" y2="1">
      <stop offset="0" stop-color="#FFF0A0"/>
      <stop offset="0.28" stop-color="#F9D66B"/>
      <stop offset="0.62" stop-color="#E7B63F"/>
      <stop offset="1" stop-color="#C88C19"/>
